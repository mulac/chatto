apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: dev-redis
  namespace: flux-system
spec:
  path: ./apps/redis
  prune: true
  interval: 10m
  wait: true
  targetNamespace: dev
  dependsOn:
    - name: redis-operator
  sourceRef:
    kind: GitRepository
    name: flux-system