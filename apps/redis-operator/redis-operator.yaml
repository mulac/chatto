apiVersion: v1
kind: Namespace
metadata:
  name: redis-operator
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis-operator
  namespace: redis-operator
spec:
  releaseName: redis-operator
  interval: 5m
  chart:
    spec:
      chart: redis-operator
      version: 0.24.0
      sourceRef:
        kind: HelmRepository
        name: opstree-charts
        namespace: flux-system
  values:
    resources:
      limits:
        memory: 500Mi
        cpu: 500m
      requests:
        memory: 200Mi
        cpu: 100m
  install:
    createNamespace: false
    crds: CreateReplace
  upgrade:
    crds: CreateReplace